version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: boomerang-db
    environment:
      POSTGRES_USER: boomerang
      POSTGRES_PASSWORD: boomerang_secret
      POSTGRES_DB: boomerang_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boomerang -d boomerang_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: boomerang-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@boomerang.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
