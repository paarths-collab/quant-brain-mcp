services:
  - type: web
    name: mcp-quant-brain
    runtime: python
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HOST
        value: 0.0.0.0
